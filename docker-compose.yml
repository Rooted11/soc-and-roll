services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     soc
      POSTGRES_PASSWORD: soc_pass
      POSTGRES_DB:       soc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d soc_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://soc:soc_pass@db:5432/soc_db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/backend          # hot-reload in dev
      - ./data:/data                # threat feed + sample data
      - ./scripts:/scripts          # seed / simulation scripts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── React frontend (dev server) ───────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      BACKEND_URL: "http://backend:8000"        # vite proxy target inside Docker
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
