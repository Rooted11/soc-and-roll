services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      USE_REDIS_STREAMS: ${USE_REDIS_STREAMS:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTH_ENABLED: "true"
      AUTH_USERNAME: ${AUTH_USERNAME}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      AUTH_TOKEN_TTL_MINUTES: ${AUTH_TOKEN_TTL_MINUTES:-480}
      AUTH_MFA_ENABLED: ${AUTH_MFA_ENABLED:-false}
      AUTH_TOTP_SECRET: ${AUTH_TOTP_SECRET:-}
      AUTH_TOTP_ISSUER: ${AUTH_TOTP_ISSUER:-Ataraxia}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      API_RATE_LIMIT_REQUESTS: ${API_RATE_LIMIT_REQUESTS:-300}
      API_RATE_LIMIT_WINDOW_SECONDS: ${API_RATE_LIMIT_WINDOW_SECONDS:-60}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-5}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      ENABLE_API_DOCS: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PUBLIC_PORT:-3000}:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    command: ["python", "-m", "app.worker"]
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      USE_REDIS_STREAMS: ${USE_REDIS_STREAMS:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTH_ENABLED: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
  redis_data:
